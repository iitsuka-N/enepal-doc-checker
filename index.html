<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>必要書類チェック＆不足書類通知画像生成ツール</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Noto+Serif+JP:wght@700&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy: #16243F;
      --navy-light: #29406B;
      --enepal-green: #58B957;
      --enepal-green-deep: #279B49;
      --enepal-blue: #18A7D7;
      --enepal-sky: #EAF8FC;
      --amber: #58B957;
      --amber-soft: #EAF8EC;
      --paper: #F7FBF8;
      --stamp: #B23B2E;
      --gray: #7C8797;
      --line: #DCE8E0;
      --white: #FFFFFF;
      --surface: rgba(255, 255, 255, 0.86);
      --shadow: 0 24px 70px rgba(28, 115, 76, 0.12);
      --radius: 8px;
    }

    [data-ui-theme="portal"] {
      --paper: #F7FBF8;
      --surface: rgba(255, 255, 255, 0.88);
      --shadow: 0 24px 70px rgba(28, 115, 76, 0.12);
    }

    [data-ui-theme="compact"] {
      --paper: #F6FAFB;
      --surface: #FFFFFF;
      --shadow: none;
      --line: #DCE8E0;
      --radius: 6px;
    }

    [data-ui-theme="premium"] {
      --paper: #F4FBF0;
      --surface: rgba(255, 255, 255, 0.9);
      --shadow: 0 26px 78px rgba(33, 151, 91, 0.16);
      --line: #CDE9D0;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(135deg, rgba(88, 185, 87, 0.14), transparent 34%),
        linear-gradient(315deg, rgba(24, 167, 215, 0.12), transparent 38%),
        var(--paper);
      color: var(--navy);
      font-family: "Noto Sans JP", system-ui, sans-serif;
      font-size: 16px;
      letter-spacing: 0;
    }

    button,
    input {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .app {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 26px 0 48px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 20px;
      padding: 18px 20px;
      border: 1px solid rgba(88, 185, 87, 0.24);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(12px);
    }

    .brand {
      min-width: 0;
    }

    .eyebrow {
      margin: 0 0 4px;
      color: var(--enepal-green-deep);
      font-size: 0.84rem;
      font-weight: 700;
    }

    h1 {
      margin: 0;
      font-family: "Noto Serif JP", serif;
      font-size: clamp(1.45rem, 2.4vw, 2.2rem);
      line-height: 1.32;
    }

    .signature {
      flex: 0 0 auto;
      padding: 0;
      border: 0;
      border-radius: 0;
      background: transparent;
      color: var(--navy-light);
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(320px, 410px);
      gap: 22px;
      align-items: start;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    .controls,
    .preview {
      padding: 20px;
    }

    .section-title {
      margin: 0 0 12px;
      font-size: 0.98rem;
      font-weight: 700;
    }

    .section-title:not(:first-child) {
      margin-top: 20px;
    }

    .tabs,
    .choice-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .tabs {
      margin-bottom: 20px;
    }

    .tab,
    .choice {
      min-height: 44px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--white);
      color: var(--navy-light);
      font-weight: 700;
      transition: border-color 0.18s ease, background 0.18s ease, color 0.18s ease, transform 0.18s ease;
    }

    .choice {
      min-height: 58px;
      padding: 8px;
      font-size: 0.9rem;
      line-height: 1.35;
    }

    .choice small {
      display: block;
      margin-top: 2px;
      color: var(--gray);
      font-size: 0.72rem;
      font-weight: 500;
    }

    .tab[aria-selected="true"],
    .choice[aria-pressed="true"] {
      border-color: var(--enepal-green);
      background: linear-gradient(135deg, var(--enepal-green), var(--enepal-blue));
      color: var(--white);
      box-shadow: 0 12px 24px rgba(39, 155, 73, 0.18);
    }

    .choice[aria-pressed="true"] small {
      color: rgba(255, 255, 255, 0.78);
    }

    .fields {
      display: grid;
      grid-template-columns: minmax(0, 1.5fr) minmax(180px, 0.65fr);
      gap: 12px;
    }

    .field {
      display: grid;
      gap: 6px;
    }

    .field.full {
      grid-column: 1 / -1;
    }

    label {
      color: var(--navy-light);
      font-size: 0.86rem;
      font-weight: 700;
    }

    input {
      width: 100%;
      min-height: 44px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--white);
      color: var(--navy);
      padding: 10px 12px;
      outline: none;
    }

    input:focus {
      border-color: var(--enepal-green);
      box-shadow: 0 0 0 3px rgba(88, 185, 87, 0.18);
    }

    #caseName {
      min-height: 54px;
      font-size: 1.12rem;
      font-weight: 700;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--white);
      color: var(--navy-light);
      padding: 8px 13px;
      font-weight: 700;
      transition: background 0.18s ease, border-color 0.18s ease, color 0.18s ease;
    }

    .chip::before {
      content: "";
      width: 16px;
      height: 16px;
      border: 2px solid currentColor;
      border-radius: 999px;
    }

    .chip.is-active {
      border-color: var(--enepal-green);
      background: var(--amber-soft);
      color: var(--navy);
    }

    .chip.is-active::before {
      background: radial-gradient(circle at center, var(--enepal-green) 0 44%, transparent 48%);
    }

    .docs-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(136px, 1fr));
      gap: 12px;
    }

    .doc-card {
      position: relative;
      min-height: 166px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.84);
      color: var(--gray);
      padding: 14px 12px 12px;
      text-align: center;
      transition: border-color 0.18s ease, color 0.18s ease, transform 0.18s ease, box-shadow 0.18s ease;
    }

    .doc-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 28px rgba(22, 36, 63, 0.12);
    }

    .doc-card.is-submitted {
      border-color: var(--enepal-green);
      color: var(--navy);
      background: linear-gradient(180deg, #FFFFFF, #F4FBF0);
    }

    .doc-icon {
      width: 70px;
      height: 86px;
      margin: 0 auto 10px;
      opacity: 0.45;
    }

    .doc-thumb {
      display: block;
      width: min(100%, 116px);
      aspect-ratio: 1.42;
      margin: 4px auto 12px;
      border: 1px solid var(--line);
      border-radius: 6px;
      object-fit: contain;
      object-position: center;
      background: var(--white);
      opacity: 0.55;
      box-shadow: 0 8px 18px rgba(22, 36, 63, 0.08);
    }

    .doc-thumb.is-portrait {
      width: 76px;
      aspect-ratio: 0.72;
    }

    .doc-thumb.is-landscape {
      width: min(100%, 124px);
      aspect-ratio: 1.56;
    }

    .doc-thumb.is-wide {
      width: min(100%, 128px);
      aspect-ratio: 1.9;
    }

    .doc-card.is-submitted .doc-icon {
      opacity: 1;
    }

    .doc-card.is-submitted .doc-thumb {
      opacity: 1;
      border-color: rgba(88, 185, 87, 0.55);
    }

    .doc-name {
      display: block;
      min-height: 2.8em;
      font-size: 0.95rem;
      line-height: 1.38;
      font-weight: 500;
      overflow-wrap: anywhere;
    }

    .doc-note {
      display: block;
      margin-top: 4px;
      color: var(--gray);
      font-size: 0.73rem;
      line-height: 1.35;
    }

    .doc-card.is-submitted .doc-name {
      font-weight: 700;
    }

    .stamp {
      position: absolute;
      top: 8px;
      right: 8px;
      display: none;
      width: 46px;
      height: 46px;
      align-items: center;
      justify-content: center;
      border: 3px double var(--stamp);
      border-radius: 999px;
      color: var(--stamp);
      font-family: "Noto Serif JP", serif;
      font-size: 1.2rem;
      font-weight: 700;
      line-height: 1;
      transform: rotate(-12deg);
    }

    .doc-card.is-submitted .stamp {
      display: flex;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 20px;
    }

    .btn {
      min-height: 44px;
      border: 1px solid transparent;
      border-radius: var(--radius);
      padding: 10px 15px;
      font-weight: 700;
    }

    .btn.secondary {
      border-color: var(--line);
      background: var(--white);
      color: var(--navy-light);
    }

    .btn.primary {
      background: linear-gradient(135deg, var(--enepal-green), var(--enepal-blue));
      color: var(--white);
      box-shadow: 0 14px 26px rgba(39, 155, 73, 0.22);
    }

    .preview {
      position: sticky;
      top: 18px;
    }

    .preview-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 12px;
    }

    .preview-head h2 {
      margin: 0;
      font-size: 1rem;
    }

    .download {
      min-height: 36px;
      border: 1px solid var(--navy-light);
      border-radius: var(--radius);
      background: var(--navy-light);
      color: var(--white);
      padding: 7px 11px;
      font-size: 0.9rem;
      font-weight: 700;
      text-decoration: none;
    }

    .download[aria-disabled="true"] {
      pointer-events: none;
      opacity: 0.42;
    }

    .canvas-wrap {
      display: grid;
      place-items: center;
      border: 1px dashed rgba(22, 36, 63, 0.2);
      border-radius: var(--radius);
      background: linear-gradient(135deg, rgba(88, 185, 87, 0.1), rgba(24, 167, 215, 0.1));
      padding: 12px;
    }

    canvas {
      width: min(100%, 360px);
      height: auto;
      border-radius: 6px;
      background: var(--paper);
      box-shadow: 0 14px 36px rgba(22, 36, 63, 0.18);
    }

    [data-ui-theme="compact"] .app {
      width: min(1180px, calc(100% - 24px));
      padding-top: 18px;
    }

    [data-ui-theme="compact"] .topbar {
      padding-bottom: 12px;
      border-bottom: 1px solid var(--line);
    }

    [data-ui-theme="compact"] .doc-card {
      min-height: 142px;
      padding: 12px 10px;
    }

    [data-ui-theme="compact"] .doc-icon {
      width: 58px;
      height: 72px;
    }

    [data-ui-theme="premium"] .tab[aria-selected="true"],
    [data-ui-theme="premium"] .choice[aria-pressed="true"] {
      background: linear-gradient(135deg, var(--enepal-green-deep), var(--enepal-green));
      border-color: var(--enepal-green);
    }

    @media (max-width: 860px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .preview {
        position: static;
      }
    }

    @media (max-width: 560px) {
      .app {
        width: min(100% - 20px, 1120px);
        padding-top: 18px;
      }

      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .tabs,
      .fields,
      .choice-grid {
        grid-template-columns: 1fr;
      }

      .controls,
      .preview {
        padding: 14px;
      }

      .docs-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 9px;
      }

      .doc-card {
        min-height: 156px;
        padding-inline: 8px;
      }

      .doc-icon {
        width: 62px;
        height: 76px;
      }

      .doc-thumb {
        width: min(100%, 118px);
      }
    }
  </style>
</head>
<body data-ui-theme="portal">
  <main class="app">
    <header class="topbar">
      <div class="brand">
        <p class="eyebrow">エネパル代理店向け</p>
        <h1>必要書類チェック＆不足書類通知画像生成ツール</h1>
      </div>
      <div class="signature">CH partners</div>
    </header>

    <div class="layout">
      <section class="panel controls" aria-label="書類チェック操作">
        <p class="section-title">フロー</p>
        <div class="tabs" role="tablist" aria-label="フロー選択">
          <button class="tab" type="button" data-flow="paperless" role="tab">ペーパーレス</button>
          <button class="tab" type="button" data-flow="telema" role="tab">テレマ</button>
          <button class="tab" type="button" data-flow="application" role="tab">申込書フロー</button>
        </div>

        <p class="section-title">案件情報</p>
        <div class="fields">
          <div class="field full">
            <label for="caseName">案件名</label>
            <input id="caseName" type="text" autocomplete="off" placeholder="例：株式会社〇〇 / 〇〇店">
          </div>
          <div class="field">
            <label for="caseDate">日付</label>
            <input id="caseDate" type="date">
          </div>
        </div>

        <p class="section-title">条件</p>
        <div class="chips" aria-label="条件トグル">
          <button class="chip" type="button" data-condition="corporate">法人の取引です</button>
          <button class="chip" type="button" data-condition="convenience">コンビニ払いです</button>
        </div>

        <p class="section-title">書類チェック</p>
        <div id="docsGrid" class="docs-grid"></div>

        <div class="actions">
          <button id="resetBtn" class="btn secondary" type="button">状態をリセット</button>
          <button id="generateBtn" class="btn primary" type="button">不足書類の画像を作成</button>
        </div>
      </section>

      <aside class="panel preview" aria-label="生成画像プレビュー">
        <div class="preview-head">
          <h2>プレビュー</h2>
          <a id="downloadLink" class="download" href="#" download aria-disabled="true">PNGダウンロード</a>
        </div>
        <div class="canvas-wrap">
          <canvas id="noticeCanvas" width="800" height="1000"></canvas>
        </div>
      </aside>
    </div>
  </main>

  <template id="documentIconTemplate">
    <svg class="doc-icon" viewBox="0 0 78 96" aria-hidden="true">
      <path d="M10 4H50L68 22V88C68 90.8 65.8 93 63 93H10C7.2 93 5 90.8 5 88V9C5 6.2 7.2 4 10 4Z" fill="#FBF9F4" stroke="currentColor" stroke-width="3"/>
      <path d="M50 5V22H67" fill="none" stroke="currentColor" stroke-width="3" stroke-linejoin="round"/>
      <path d="M19 38H54M19 50H54M19 62H46" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
    </svg>
  </template>

    const state = {
      flow: "paperless",
      uiTheme: "portal",
      imageTheme: "checklist",
      conditions: {
        corporate: false,
        convenience: false
      },
      submitted: {}
    };

    const els = {
      tabs: [...document.querySelectorAll(".tab")],
      chips: [...document.querySelectorAll(".chip")],
      docsGrid: document.getElementById("docsGrid"),
      resetBtn: document.getElementById("resetBtn"),
      generateBtn: document.getElementById("generateBtn"),
      canvas: document.getElementById("noticeCanvas"),
      downloadLink: document.getElementById("downloadLink"),
      caseName: document.getElementById("caseName"),
      caseDate: document.getElementById("caseDate"),
      iconTemplate: document.getElementById("documentIconTemplate")
    };

    function todayString() {
      const date = new Date();
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function displayDate(value) {
      if (!value) return "";
      const [year, month, day] = value.split("-");
      return `${year}年${Number(month)}月${Number(day)}日`;
    }

    function safeFilePart(value) {
      return (value || "未入力")
        .trim()
        .replace(/[\\/:*?"<>|]/g, "")
        .replace(/\s+/g, "_")
        .slice(0, 36) || "未入力";
    }

    function visibleDocuments() {
      return FLOWS[state.flow].documents.filter((doc) => {
        if (doc.condition === "corporate" && state.conditions.corporate) return false;
        if (doc.condition === "convenience" && state.conditions.convenience) return false;
        return true;
      });
    }

    function resetSubmitted() {
      state.submitted = {};
      visibleDocuments().forEach((doc) => {
        state.submitted[doc.id] = false;
      });
    }

    function resetAll() {
      state.conditions.corporate = false;
      state.conditions.convenience = false;
      resetSubmitted();
      render();
    }

    function renderSelections() {
      document.body.dataset.uiTheme = state.uiTheme;
    }

    function renderTabs() {
      els.tabs.forEach((tab) => {
        tab.setAttribute("aria-selected", String(tab.dataset.flow === state.flow));
      });
    }

    function renderChips() {
      els.chips.forEach((chip) => {
        const condition = chip.dataset.condition;
        const isConvenience = condition === "convenience";
        chip.hidden = isConvenience && state.flow !== "paperless";
        chip.classList.toggle("is-active", state.conditions[condition]);
        chip.setAttribute("aria-pressed", String(state.conditions[condition]));
      });
    }

    function renderDocs() {
      els.docsGrid.innerHTML = "";
      const iconMarkup = els.iconTemplate.innerHTML.trim();

      visibleDocuments().forEach((doc) => {
        if (!(doc.id in state.submitted)) state.submitted[doc.id] = false;
        const submitted = Boolean(state.submitted[doc.id]);
        const card = document.createElement("button");
        card.className = `doc-card${submitted ? " is-submitted" : ""}`;
        card.type = "button";
        card.setAttribute("aria-pressed", String(submitted));
        card.dataset.docId = doc.id;
        const shape = doc.imageShape ? ` is-${doc.imageShape}` : "";
        const visual = doc.image
          ? `<img class="doc-thumb${shape}" src="${doc.image}" alt="${doc.name}の書類画像">`
          : iconMarkup;
        card.innerHTML = `
          <span class="stamp">済</span>
          ${visual}
          <span class="doc-name">${doc.name}</span>
          ${doc.note ? `<span class="doc-note">${doc.note}</span>` : ""}
        `;
        els.docsGrid.appendChild(card);
      });
    }

    function render() {
      renderSelections();
      renderTabs();
      renderChips();
      renderDocs();
      drawPlaceholder();
    }

    function roundRect(ctx, x, y, width, height, radius) {
      const r = Math.min(radius, width / 2, height / 2);
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.arcTo(x + width, y, x + width, y + height, r);
      ctx.arcTo(x + width, y + height, x, y + height, r);
      ctx.arcTo(x, y + height, x, y, r);
      ctx.arcTo(x, y, x + width, y, r);
      ctx.closePath();
    }

    function fillRoundRect(ctx, x, y, width, height, radius, fill, stroke) {
      roundRect(ctx, x, y, width, height, radius);
      if (fill) {
        ctx.fillStyle = fill;
        ctx.fill();
      }
      if (stroke) {
        ctx.strokeStyle = stroke;
        ctx.stroke();
      }
    }

    function drawWrappedText(ctx, text, x, y, maxWidth, lineHeight) {
      const chars = [...text];
      let line = "";
      let currentY = y;

      chars.forEach((char) => {
        const testLine = line + char;
        if (ctx.measureText(testLine).width > maxWidth && line) {
          ctx.fillText(line, x, currentY);
          line = char;
          currentY += lineHeight;
        } else {
          line = testLine;
        }
      });

      if (line) ctx.fillText(line, x, currentY);
      return currentY + lineHeight;
    }

    function drawStamp(ctx, x, y, radius, text) {
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate((-12 * Math.PI) / 180);
      ctx.strokeStyle = COLORS.stamp;
      ctx.fillStyle = COLORS.stamp;
      ctx.lineWidth = 5;
      ctx.beginPath();
      ctx.arc(0, 0, radius, 0, Math.PI * 2);
      ctx.stroke();
      ctx.lineWidth = 2.5;
      ctx.beginPath();
      ctx.arc(0, 0, radius - 10, 0, Math.PI * 2);
      ctx.stroke();
      ctx.font = `700 ${radius * 0.72}px "Noto Serif JP", serif`;
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(text, 0, 2);
      ctx.restore();
    }

    const imageCache = new Map();

    function loadDocImage(src) {
      if (!src) return Promise.resolve(null);
      if (imageCache.has(src)) return imageCache.get(src);

      const promise = new Promise((resolve) => {
        const img = new Image();
        img.onload = () => {
          imageCache.set(src, img);
          resolve(img);
        };
        img.onerror = () => resolve(null);
        img.src = src;
      });
      imageCache.set(src, promise);
      return promise;
    }

    async function preloadDocImages(docs) {
      await Promise.all(docs.filter((doc) => doc.image).map((doc) => loadDocImage(doc.image)));
    }

    function drawImageContain(ctx, image, x, y, width, height) {
      if (!image) return;
      const ratio = Math.min(width / image.naturalWidth, height / image.naturalHeight);
      const drawWidth = image.naturalWidth * ratio;
      const drawHeight = image.naturalHeight * ratio;
      const dx = x + (width - drawWidth) / 2;
      const dy = y + (height - drawHeight) / 2;
      ctx.drawImage(image, dx, dy, drawWidth, drawHeight);
    }

    function getInfo() {
      return {
        caseName: els.caseName.value.trim(),
        date: els.caseDate.value,
        flowName: FLOWS[state.flow].name
      };
    }

    function drawFooter(ctx, variant = "dark") {
      return;
    }

    function drawCaseTitle(ctx, info, x, y, maxWidth, color = COLORS.navy) {
      ctx.fillStyle = color;
      ctx.font = '700 42px "Noto Sans JP", sans-serif';
      ctx.textAlign = "left";
      return drawWrappedText(ctx, info.caseName || "案件名未入力", x, y, maxWidth, 52);
    }

    function drawMeta(ctx, info, x, y, color = "rgba(255,255,255,0.86)") {
      ctx.font = '500 21px "Noto Sans JP", sans-serif';
      ctx.fillStyle = color;
      ctx.textAlign = "left";
      ctx.fillText(`日付：${displayDate(info.date)}`, x, y);
    }

    function drawMissingList(ctx, missing, x, y, options = {}) {
      const box = options.box || false;
      const rowWidth = options.rowWidth || 600;
      const rowHeight = options.rowHeight || 76;
      const rowGap = options.rowGap ?? (box ? 12 : 0);
      const imageBoxWidth = options.imageBoxWidth || 94;
      const imageBoxHeight = options.imageBoxHeight || 58;
      const imageWidth = options.imageWidth || 80;
      const imageHeight = options.imageHeight || 48;
      const imageX = options.imageX || 7;
      const imageY = options.imageY || 5;
      const textOffset = options.textOffset || (docHasImages(missing) ? imageBoxWidth + 22 : 48);
      const nameFontSize = options.nameFontSize || 28;
      let currentY = y;

      missing.forEach((doc, index) => {
        const image = doc.image ? imageCache.get(doc.image) : null;
        const resolvedImage = image && typeof image.then !== "function" ? image : null;

        if (box) {
          ctx.save();
          ctx.shadowColor = "rgba(0, 0, 0, 0.035)";
          ctx.shadowBlur = 10;
          ctx.shadowOffsetY = 4;
          fillRoundRect(ctx, x - 16, currentY - rowHeight / 2, rowWidth, rowHeight, 6, "#FAFAF8", null);
          ctx.restore();
          fillRoundRect(ctx, x - 16, currentY - rowHeight / 2, rowWidth, rowHeight, 6, null, "#E2E2DD");
        }

        if (doc.image) {
          ctx.save();
          ctx.shadowColor = "rgba(0, 0, 0, 0.08)";
          ctx.shadowBlur = 7;
          ctx.shadowOffsetY = 3;
          fillRoundRect(ctx, x, currentY - imageBoxHeight / 2, imageBoxWidth, imageBoxHeight, 4, COLORS.white, null);
          ctx.restore();
          fillRoundRect(ctx, x, currentY - imageBoxHeight / 2, imageBoxWidth, imageBoxHeight, 4, null, "#D9D9D4");
          drawImageContain(ctx, resolvedImage, x + imageX, currentY - imageBoxHeight / 2 + imageY, imageWidth, imageHeight);
        } else if (options.numbered) {
          ctx.fillStyle = COLORS.amber;
          ctx.font = '700 22px "Noto Serif JP", serif';
          ctx.textAlign = "center";
          ctx.fillText(String(index + 1).padStart(2, "0"), x + 16, currentY);
        } else {
          fillRoundRect(ctx, x, currentY - 26, 30, 30, 5, COLORS.amber, COLORS.amber);
          ctx.strokeStyle = COLORS.white;
          ctx.lineWidth = 4;
          ctx.beginPath();
          ctx.moveTo(x + 8, currentY - 10);
          ctx.lineTo(x + 15, currentY - 3);
          ctx.lineTo(x + 24, currentY - 18);
          ctx.stroke();
          ctx.lineWidth = 2;
        }

        const textX = doc.image ? x + textOffset : x + 48;
        ctx.fillStyle = "#111111";
        ctx.font = `700 ${nameFontSize}px "Noto Sans JP", sans-serif`;
        ctx.textAlign = "left";
        ctx.fillText(doc.name, textX, currentY);

        currentY += rowHeight + rowGap;
      });
    }

    function docHasImages(docs) {
      return docs.some((doc) => doc.image);
    }

    function drawFormal(ctx, info, missing) {
      ctx.fillStyle = "#F7FBF8";
      ctx.fillRect(0, 0, 800, 1000);
      ctx.fillStyle = COLORS.white;
      ctx.fillRect(0, 0, 800, 1000);
      ctx.fillStyle = "#EAF8EC";
      ctx.fillRect(0, 0, 800, 218);
      ctx.fillStyle = COLORS.navy;
      ctx.fillRect(0, 0, 800, 12);
      ctx.fillStyle = COLORS.amber;
      ctx.fillRect(0, 12, 800, 8);

      ctx.fillStyle = COLORS.navy;
      ctx.font = '700 32px "Noto Serif JP", serif';
      ctx.textAlign = "left";
      ctx.fillText("ご提出書類のご案内", 56, 68);
      const nameBottom = drawCaseTitle(ctx, info, 56, 128, 610, COLORS.navy);
      drawMeta(ctx, info, 56, nameBottom + 16, COLORS.navyLight);

      fillRoundRect(ctx, 46, 258, 708, 570, 8, COLORS.white, COLORS.line);

      if (missing.length > 0) {
        ctx.fillStyle = COLORS.navy;
        ctx.font = '700 28px "Noto Sans JP", sans-serif';
        ctx.fillText("不足書類", 84, 326);
        ctx.fillStyle = COLORS.navyLight;
        ctx.font = '400 22px "Noto Sans JP", sans-serif';
        const y = drawWrappedText(ctx, "下記の書類が不足しております。ご確認のほどよろしくお願いいたします。", 84, 374, 632, 34);
        drawMissingList(ctx, missing, 84, y + 26);
      } else {
        drawComplete(ctx, 400, 410, 570);
      }

      drawFooter(ctx, "light");
    }

    function drawChecklist(ctx, info, missing) {
      ctx.fillStyle = COLORS.white;
      ctx.fillRect(0, 0, 800, 1000);
      const bgGradient = ctx.createLinearGradient(0, 0, 800, 1000);
      bgGradient.addColorStop(0, "#F7F7F4");
      bgGradient.addColorStop(0.58, "#FFFFFF");
      bgGradient.addColorStop(1, "#F2F2EF");
      ctx.fillStyle = bgGradient;
      ctx.fillRect(0, 0, 800, 1000);

      ctx.save();
      ctx.shadowColor = "rgba(0, 0, 0, 0.055)";
      ctx.shadowBlur = 22;
      ctx.shadowOffsetY = 10;
      ctx.fillStyle = COLORS.white;
      ctx.fillRect(54, 36, 692, 896);
      ctx.restore();

      ctx.fillStyle = "#111111";
      ctx.font = '700 32px "Noto Serif JP", serif';
      ctx.textAlign = "left";
      ctx.fillText("チェックリスト", 82, 90);
      ctx.fillStyle = "#111111";
      ctx.fillRect(82, 108, 118, 4);
      const nameBottom = drawCaseTitle(ctx, info, 82, 164, 610, "#111111");
      drawMeta(ctx, info, 82, nameBottom + 20, "#333333");

      if (missing.length > 0) {
        const listCardHeight = Math.min(626, Math.max(456, 260 + missing.length * 98));
        ctx.save();
        ctx.shadowColor = "rgba(0, 0, 0, 0.04)";
        ctx.shadowBlur = 14;
        ctx.shadowOffsetY = 6;
        fillRoundRect(ctx, 82, 286, 636, listCardHeight, 10, "#FFFFFF", null);
        ctx.restore();
        fillRoundRect(ctx, 82, 286, 636, listCardHeight, 8, null, "#DADAD5");
        ctx.fillStyle = "#111111";
        ctx.font = '700 27px "Noto Sans JP", sans-serif';
        ctx.fillText("ご確認をお願いいたします", 112, 354);
        ctx.fillStyle = "#333333";
        ctx.font = '400 20px "Noto Sans JP", sans-serif';
        ctx.fillText("不足している書類のみを一覧にしています。", 112, 400);
        ctx.fillText("回収いただき、グループへ送付をお願いいたします。", 112, 434);
        drawMissingList(ctx, missing, 128, 504, {
          box: true,
          rowWidth: 544,
          rowHeight: 98,
          rowGap: 12,
          imageBoxWidth: 146,
          imageBoxHeight: 82,
          imageWidth: 132,
          imageHeight: 70,
          imageX: 7,
          imageY: 6,
          textOffset: 174,
          nameFontSize: 27
        });
      } else {
        ctx.save();
        ctx.shadowColor = "rgba(0, 0, 0, 0.04)";
        ctx.shadowBlur = 14;
        ctx.shadowOffsetY = 6;
        fillRoundRect(ctx, 82, 286, 636, 566, 10, "#FFFFFF", null);
        ctx.restore();
        fillRoundRect(ctx, 82, 286, 636, 566, 8, null, "#DADAD5");
        drawComplete(ctx, 400, 410, 570);
      }

      drawFooter(ctx, "light");
    }

    function drawStampTheme(ctx, info, missing) {
      ctx.fillStyle = "#F7FBF8";
      ctx.fillRect(0, 0, 800, 1000);
      ctx.fillStyle = COLORS.navy;
      ctx.fillRect(0, 0, 800, 236);
      ctx.fillStyle = COLORS.amber;
      ctx.fillRect(0, 236, 800, 10);

      ctx.fillStyle = COLORS.white;
      ctx.font = '700 36px "Noto Serif JP", serif';
      ctx.fillText("書類確認のお願い", 54, 70);
      const nameBottom = drawCaseTitle(ctx, info, 54, 132, 520, COLORS.white);
      drawMeta(ctx, info, 54, nameBottom + 14);
      drawStamp(ctx, 656, 118, 62, missing.length > 0 ? "不足" : "完了");

      fillRoundRect(ctx, 46, 286, 708, 542, 8, COLORS.white, COLORS.line);

      if (missing.length > 0) {
        ctx.fillStyle = COLORS.navy;
        ctx.font = '700 30px "Noto Sans JP", sans-serif';
        ctx.fillText("未提出の書類", 84, 352);
        ctx.fillStyle = COLORS.navyLight;
        ctx.font = '400 21px "Noto Sans JP", sans-serif';
        const y = drawWrappedText(ctx, "下記書類のご確認をお願いいたします。条件により不要な書類は表示していません。", 84, 398, 632, 34);
        drawMissingList(ctx, missing, 92, y + 30, { numbered: true });
      } else {
        drawComplete(ctx, 400, 414, 590);
      }

      drawFooter(ctx);
    }

    function drawComplete(ctx, textX, textY, stampY) {
      ctx.fillStyle = COLORS.navy;
      ctx.font = '700 34px "Noto Sans JP", sans-serif';
      ctx.textAlign = "center";
      ctx.fillText("書類はすべてご提出いただいております", textX, textY);
      drawStamp(ctx, 400, stampY, 104, "完了");
    }

    function drawNotice() {
      const ctx = els.canvas.getContext("2d");
      const docs = visibleDocuments();
      const missing = docs.filter((doc) => !state.submitted[doc.id]);
      const info = getInfo();

      ctx.clearRect(0, 0, 800, 1000);
      if (state.imageTheme === "checklist") {
        drawChecklist(ctx, info, missing);
      } else if (state.imageTheme === "stamp") {
        drawStampTheme(ctx, info, missing);
      } else {
        drawFormal(ctx, info, missing);
      }

      const fileName = `不足書類_${safeFilePart(info.caseName)}_${info.date || todayString()}.png`;
      els.downloadLink.href = els.canvas.toDataURL("image/png");
      els.downloadLink.download = fileName;
      els.downloadLink.setAttribute("aria-disabled", "false");
    }

    function drawPlaceholder() {
      const ctx = els.canvas.getContext("2d");
      const info = getInfo();
      ctx.clearRect(0, 0, 800, 1000);
      if (state.imageTheme === "checklist") {
        drawChecklist(ctx, info, []);
      } else if (state.imageTheme === "stamp") {
        drawStampTheme(ctx, info, []);
      } else {
        drawFormal(ctx, info, []);
      }
      ctx.fillStyle = "rgba(251,249,244,0.72)";
      ctx.fillRect(0, 0, 800, 1000);
      fillRoundRect(ctx, 112, 404, 576, 132, 8, COLORS.white, COLORS.line);
      ctx.fillStyle = COLORS.gray;
      ctx.font = '700 26px "Noto Sans JP", sans-serif';
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText("不足書類の画像を作成すると確定します", 400, 470);
      ctx.textBaseline = "alphabetic";
      els.downloadLink.href = "#";
      els.downloadLink.setAttribute("aria-disabled", "true");
    }

    async function generateImage() {
      if (document.fonts && document.fonts.load) {
        await Promise.all([
          document.fonts.load('700 48px "Noto Serif JP"'),
          document.fonts.load('700 42px "Noto Serif JP"'),
          document.fonts.load('400 22px "Noto Sans JP"'),
          document.fonts.load('700 28px "Noto Sans JP"')
        ]);
      }
      await preloadDocImages(visibleDocuments());
      drawNotice();
    }

    els.tabs.forEach((tab) => {
      tab.addEventListener("click", () => {
        state.flow = tab.dataset.flow;
        if (state.flow !== "paperless") state.conditions.convenience = false;
        resetSubmitted();
        render();
      });
    });

    els.chips.forEach((chip) => {
      chip.addEventListener("click", () => {
        const condition = chip.dataset.condition;
        state.conditions[condition] = !state.conditions[condition];
        render();
      });
    });

    els.docsGrid.addEventListener("click", (event) => {
      const card = event.target.closest(".doc-card");
      if (!card) return;
      const id = card.dataset.docId;
      state.submitted[id] = !state.submitted[id];
      renderDocs();
      drawPlaceholder();
    });

    els.resetBtn.addEventListener("click", resetAll);
    els.generateBtn.addEventListener("click", generateImage);
    [els.caseName, els.caseDate].forEach((input) => {
      input.addEventListener("input", drawPlaceholder);
    });

    els.caseDate.value = todayString();
    resetSubmitted();
    render();
  </script>
</body>
</html>
